<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos lab</title>
    <link rel="stylesheet" href="photography.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
</head>
<body>
    <div class="home">
        <div class="home-txt">
            <!-- <p class="fav">THE SILENT WILDERNESS</p> -->
            <h1>RVP PHOTOGRAPHY</h1>
            <P>Capturing the raw. unfiltered essence of nature through breath taking photography.</P>
            <div class="home-btns">
                <button class="btn primary">View collection</button>
                <button class="btn secondary">The Journey →</button>
            </div>
        </div>
        <div class="main_box">
            <input type="checkbox" id="check" />
            <div class="btn_one">
                <label for="check" style="color: white">
                    <i class="fa-solid fa-bars"></i>
                </label>
            </div>
            <div class="sidebar_menu">
                <div class="logo">
                    <a href="#">RVP Studio</a>
                </div>

                <div class="btn_two">
                    <label for="check" style="color: grey">
                        <i class="fa-solid fa-xmark"></i>
                    </label>
                </div>

                <div class="menu">
                    <ul>
                        <li>
                            <i class="fa-solid fa-house"></i>
                            <a href="#">Home</a>
                        </li>
                        <li>
                            <i class="fa-solid fa-image"></i>
                            <a href="#">Gallery</a>
                        </li>
                        <li>
                            <i class="fa-solid fa-photo-film"></i>
                            <a href="#">Exhibits</a>
                        </li>
                        <li>
                            <i class="fa-solid fa-phone"></i>
                            <a href="#">Contact</a>
                        </li>
                        <li>
                            <i class="fa-regular fa-comments"></i>
                            <a href="#">Feedback</a>
                        </li>
                    </ul>
                </div>

                <div class="social_media">
                    <ul>
                    <a href="#"><i class="fa-brands fa-facebook"></i></i></a>
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></i></a>
                    <a href="#"><i class="fa-brands fa-youtube"></i></a>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <div class="mid-txt">
        <p>Selected works</p>
        <h2>Moments of Solitude</h2>
    </div>
    <div class="gallery">
        <img src="main1.jpeg" alt="orange-evening-img">
        <img src="main.jpeg" alt="sunset-img">
        <img src="night.jpeg" alt="nyt-moon-img">
        <img src="evenings.jpeg" alt="colorfull-evening-img">
    </div>
    <div class="mid-txt">
        <h2>Emerald Calm</h2>
    </div>
    <div class="gallery">
        <img src="main2.jpeg" alt="green-img">
        <img src="flowers.jpeg" alt="cloud-img">
        <img src="villege.jpeg" alt="village-green-img">
        <img src="forest.jpeg" alt="beach-img">
    </div>
    <div class="mid-txt">
        <h2>Weightless peace</h2>
    </div>
    <div class="gallery">
        <img src="water4.jpeg" alt="green-img">
        <img src="water 1.jpeg" alt="cloud-img">
        <img src="water2.jpeg" alt="village-green-img">
        <img src="water3.jpeg" alt="beach-img">
    </div>
</body>
</html>
